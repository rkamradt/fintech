name: account-service — Build and Push

on:
  push:
    branches: [main]
    paths:
      - 'account-service/**'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: rkamradt/account-service

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image tag
        id: tag
        run: echo "tag=sha-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./account-service
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }}

      - name: Update version-values.yaml in helm-charts
        run: |
          git clone https://x-access-token:${{ secrets.HELM_CHARTS_PAT }}@github.com/rkamradt/rkamradt-helm-charts.git
          cd rkamradt-helm-charts
          printf 'image:\n  tag: "%s"\n' "${{ steps.tag.outputs.tag }}" > account-service/version-values.yaml
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add account-service/version-values.yaml
          git commit -m "Update account-service image tag to ${{ steps.tag.outputs.tag }}"
          git push
